<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Studio alat PDF & foto — gabung, kompres, konversi, hapus latar & watermark. 100% diproses di perangkatmu, tanpa upload." />
  <meta name="theme-color" content="#F4F4F1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0E0F13" media="(prefers-color-scheme: dark)" />
  <title>PressPDF Studio — Alat PDF & Foto Privat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    // apply saved/OS theme before paint to avoid a flash
    (function () {
      try {
        var t = localStorage.getItem('pp-theme') ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', t)
      } catch (e) {}
    })()
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
